name: Deploy Godot Web

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  export-web:
    runs-on: ubuntu-24.04

    container:
      image: barichello/godot-ci:4.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.4.stable \
             ~/.local/share/godot/export_templates/4.4.stable

      - name: Build Web Export
        run: |
          mkdir -p build/web
          godot --headless --verbose \
            --path "$GITHUB_WORKSPACE/Code" \
            --export-release "Web" \
            ../build/web/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build/web
